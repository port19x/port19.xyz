name: Zola on GitHub Pages

on:
 push:
  branches:
   - master

jobs:
  dead-links:
    name: Run Deadsniper
    runs-on: ubuntu-latest
    steps:
      - name: Download & Run Deadsniper (with retry)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 5
          timeout_minutes: 2
          command: |
            wget -q "https://github.com/port19x/deadsniper/releases/download/v1.3/deadsniper" \
              && chmod +x deadsniper \
              && ./deadsniper https://port19.xyz/sitemap.xml
  trailing-ws:
    name: Find Trailing Whitespace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ocular-d/trailing-spaces@0.0.2
  build:
    name: Publish site
    runs-on: ubuntu-latest
    steps:
    - name: Checkout master
      uses: actions/checkout@v6
    - name: Build and deploy
      uses: shalzz/zola-deploy-action@v0.22.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
